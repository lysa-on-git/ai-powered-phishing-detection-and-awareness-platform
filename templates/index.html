<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI-Powered Phishing Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .hero {
      background: linear-gradient(135deg, #1f497d, #2e74b5);
      color: white;
      padding: 15px 0 40px;
    }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .btn-primary {
      background-color: #1f497d;
      border-color: #1f497d;
    }

    .btn-primary:hover {
      background-color: #2e74b5;
      border-color: #2e74b5;
    }

    textarea,
    input {
      border-radius: 10px !important;
    }
  </style>
</head>

<body>

  <!-- Hero Header -->
  <div class="hero text-center mb-5">
    <h1 class="fw-bold"><i class="bi bi-shield-lock-fill me-2"></i>AI-Powered Phishing Detection & Awareness Platform<i class="bi bi-shield-lock-fill me-2"></i></h1>
    <p class="lead mb-0">By Global CODEHERS Team 41 Techsters</p>
    <!-- Navbar -->
    <nav class="navbar navbar-expand navbar-dark" style="background-color: #17375e;">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-house me-1"></i>Home</a>
        <div class="navbar-nav ms-auto">
          <a class="nav-link text-white" href="/awareness"><i class="bi bi-book me-1"></i>Awareness</a>
          <a class="nav-link text-white" href="/dashboard"><i class="bi bi-bar-chart-line me-1"></i>Dashboard</a>
        </div>
      </div>
    </nav>
  </div>

  <div class="container" style="max-width: 700px;">
    <div class="card p-4 mb-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-envelope-open-text me-2 text-primary"></i>Analyze an Email</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Content</label>
          <textarea name="email_text" class="form-control" rows="6"
            placeholder="Paste the email text here..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Sender Domain <span
              class="text-muted fw-normal">(optional)</span></label>
          <input type="text" name="domain" class="form-control" placeholder="e.g. suspicious-bank.com">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Attachment Path <span
              class="text-muted fw-normal">(optional)</span></label>
          <input type="text" name="attachment" class="form-control" placeholder="e.g. /home/kali/file.pdf">
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">
            <i class="bi bi-search me-2"></i>Analyze Email
          </button>
        </div>
      </form>
    </div>

    <div class="text-center mb-5">
      <a href="/dashboard" class="btn btn-outline-secondary">
        <i class="bi bi-bar-chart-line me-2"></i>View Dashboard
      </a>
    </div>
  </div>

</body>

</html>
