<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .hero { background: linear-gradient(135deg, #1f497d, #2e74b5); color: white; padding: 50px 0 40px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  </style>
</head>
<body>

  <div class="hero text-center mb-5">
    <h1 class="fw-bold"><i class="bi bi-bar-chart-line-fill me-2"></i>Dashboard</h1>
    <p class="lead mb-0">Dataset Distribution Overview</p>
  </div>

  <div class="container" style="max-width: 700px;">
    <div class="card p-4 mb-4 text-center">
      <h5 class="fw-bold mb-1">Safe vs Phishing Emails</h5>
      <p class="text-muted mb-4">Distribution of emails in the training dataset</p>
      <img src="/static/charts.png" alt="Dashboard Chart" class="img-fluid rounded">
    </div>

    <div class="text-center mb-5">
      <a href="/" class="btn btn-primary">
        <i class="bi bi-arrow-left me-2"></i>Back to Home
      </a>
    </div>
  </div>

</body>
</html>
